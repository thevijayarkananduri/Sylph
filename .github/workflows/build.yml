name: Build Flutter APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Create Flutter project
        run: |
          flutter create --project-name sylph temp_project
          cp -r temp_project/android .
          cp -r temp_project/ios .
          cp temp_project/.metadata .
          cp temp_project/analysis_options.yaml .
          rm -rf temp_project

      - name: Fix Kotlin version in settings.gradle
        run: |
          cat android/settings.gradle
          # Replace the Kotlin plugin version line
          sed -i 's|id "org.jetbrains.kotlin.android" version "[^"]*"|id "org.jetbrains.kotlin.android" version "1.9.22"|g' android/settings.gradle
          cat android/settings.gradle

      - name: Fix Kotlin version in build.gradle (legacy)
        run: |
          if [ -f android/build.gradle ]; then
            sed -i 's|ext.kotlin_version = "[^"]*"|ext.kotlin_version = "1.9.22"|g' android/build.gradle
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sylph-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
